<html>  
<head>  
    <title>To-Do List</title>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    </head>
<body>  
<h1>My To-Do List</h1>
<h2>Add New Task Below</h2>
<form hx-post="/create_task" hx-target ="#task-list">
    <input type="text" name="task_description" placeholder="add task">
    <input type="text" name="task_priority" placeholder="set priority">
    <button type="submit">Add Task</button>
    </form>

    <h2>Current Tasks</h2>

    <div id="task-list">
        {% include 'todo_list.html' %}
    </div>
    

</body>

</html>
